<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Window Tint Visualizer</title>
  <!-- Bump the ?rel= query on every release — browsers heuristically cache these
       without revalidating, and a mixed old/new set breaks the page silently.
       (Keep this comment free of literal rel numbers: greps for the live version
       must match the script tags only.) -->
  <link rel="stylesheet" href="css/app.css?rel=63">
</head>
<body>
  <header>
    <div id="brandLogo"></div>
    <div class="page-title" id="pageTitle">Tint Visualizer</div>
  </header>

  <section class="hero">
    <div class="hero-inner">
      <div class="eyebrow" id="heroEyebrow"></div>
      <h1 id="heroTitle"></h1>
      <p class="hero-sub" id="heroSub"></p>
    </div>
  </section>

  <main>
    <!-- stage -->
    <section class="stage-wrap">
      <div class="stage" id="stage"></div>
      <div class="stage-tools">
        <div class="group"><span class="group-label">Vehicle</span><span id="vehTabs" class="group"></span></div>
        <div class="group"><span class="group-label">Paint</span><span id="paints" class="group"></span></div>
        <div class="group">
          <button id="holdCompare" class="toggle-btn" title="Press and hold to see factory glass">Hold: factory glass</button>
        </div>
      </div>
    </section>

    <!-- controls -->
    <section class="panel">
      <div class="card">
        <h2>Film Series</h2>
        <div class="series-tabs" id="seriesTabs"></div>
        <div class="series-desc" id="seriesDesc"></div>
        <span class="series-tech" id="seriesTech"></span>
      </div>

      <div class="card">
        <h2>Windows &amp; Shade</h2>
        <div class="zone-bar" id="zoneBar"></div>
        <div class="zone-note" id="zoneNote"></div>
        <div class="shade-chips" id="shadeChips"></div>
      </div>

      <div class="card">
        <h2>Performance</h2>
        <div class="specs" id="specs"></div>
        <div class="specs-note" id="specsNote"></div>
      </div>

      <div class="card">
        <h2>Is it legal in your state?</h2>
        <select class="law-select" id="lawSelect"></select>
        <div class="law-rows" id="lawRows"></div>
        <div class="law-note" id="lawNote"></div>
      </div>

      <div class="card" id="savingsCard" hidden>
        <div class="sv-head">
          <h2>Fuel &amp; Energy Savings</h2>
          <button id="svToggle" class="sv-switch" role="switch" aria-checked="false" aria-label="Show fuel and energy savings estimate"><span class="sv-knob"></span></button>
        </div>
        <div id="svBody" hidden>
          <div class="sv-inputs">
            <div class="sv-seg" id="svMode" role="group" aria-label="Powertrain">
              <button data-m="gas" class="on">Gas</button><button data-m="hybrid">Hybrid</button><button data-m="ev">EV</button>
            </div>
            <div class="sv-seg" id="svBody2" role="group" aria-label="Body style"></div>
            <label class="sv-field">Miles / year
              <input id="svMiles" type="number" min="1000" max="60000" step="500" value="13500" inputmode="numeric">
            </label>
            <label class="sv-field" id="svPriceField">Fuel $ / gal
              <input id="svPrice" type="number" min="1" max="9" step="0.05" value="3.10" inputmode="decimal">
            </label>
          </div>
          <label class="sv-field sv-veh">Your vehicle <span class="sv-opt">(optional — helps your dealer quote)</span>
            <input id="svVehicle" type="text" maxlength="60" placeholder="e.g. 2022 Chevrolet Tahoe" autocomplete="off">
          </label>
          <div class="sv-results" id="svResults"></div>
          <div class="sv-note" id="svNote"></div>
        </div>
      </div>

      <div class="card" id="bsCard" hidden>
        <div class="sv-head">
          <h2>Cooling Cost Savings</h2>
          <button id="bsToggle" class="sv-switch" role="switch" aria-checked="false" aria-label="Show cooling cost savings estimate"><span class="sv-knob"></span></button>
        </div>
        <div id="bsBody" hidden>
          <div class="sv-inputs">
            <label class="sv-field">ZIP code
              <input id="bsZip" type="text" inputmode="numeric" maxlength="5" placeholder="77002" autocomplete="postal-code">
            </label>
            <label class="sv-field">State
              <select class="law-select" id="bsState"></select>
            </label>
            <label class="sv-field">Glass area (sq ft)
              <input id="bsSqft" type="number" min="20" max="50000" step="10" inputmode="numeric">
            </label>
            <label class="sv-field">Installed $ / sq ft
              <input id="bsCost" type="number" min="3" max="30" step="0.5" inputmode="decimal">
            </label>
          </div>
          <div class="sv-results" id="bsResults"></div>
          <div class="sv-note" id="bsNote"></div>
        </div>
      </div>

      <div class="card">
        <div class="cta-tagline" id="ctaTagline"></div>
        <a class="cta-btn" id="dealerBtn" href="#" target="_top">Find a Dealer</a>
      </div>
    </section>
  </main>

  <footer id="disclaimer"></footer>

  <script type="importmap">
    { "imports": { "three": "./vendor/three.module.js", "three/addons/": "./vendor/addons/" } }
  </script>
  <script type="module" src="js/viewer3d.js?rel=62"></script>
  <script src="js/vehicles.js?rel=62"></script>
  <script src="js/photocars.js?rel=62"></script>
  <script src="js/tintlaws.js?rel=62"></script>
  <script src="js/buildings.js?rel=63"></script>
  <script src="js/photoviz.js?rel=63"></script>
  <script src="js/bsavings.js?rel=62"></script>
  <script src="js/brands.js?rel=63"></script>
  <script src="js/intro.js?rel=62"></script>
  <script src="js/savings.js?rel=62"></script>
  <script src="js/app.js?rel=63"></script>
</body>
</html>
